name: IRCC news check

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:

permissions:
  contents: write  # needed so the workflow can commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/index.js

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "ircc-news-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "chore(state): update last-seen snapshot"
            git push
          fi
